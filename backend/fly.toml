# Fly.io 部署設定 — dry-pants 後端（FastAPI + SQLite）
# 用法：在 backend/ 目錄執行 `fly deploy`（需先 `fly volumes create`，見 DEPLOY.md）
app = "dry-pants-api"
primary_region = "iad"   # us-east（Ashburn），貼近原 EC2 us-east-1

[build]
  dockerfile = "Dockerfile"

[env]
  # SQLite 改放掛載的 volume（/data），容器重啟/重建資料不滅
  SQLALCHEMY_DATABASE_URL = "sqlite:////data/dry_pants.db"

# 持久化 volume：放 SQLite 檔
[[mounts]]
  source = "dry_pants_data"
  destination = "/data"

[http_service]
  internal_port = 8000        # 對應 Dockerfile 的 uvicorn --port 8000
  force_https = true          # 免費 HTTPS（原 EC2 是裸 http）
  auto_stop_machines = "stop" # 閒置自動停機 → 趨近零成本
  auto_start_machines = true  # 有請求自動喚醒（首次冷啟約數秒）
  min_machines_running = 0

# 健康檢查：對應 main.py 的 GET /api/health
[[http_service.checks]]
  interval = "30s"
  timeout = "5s"
  grace_period = "10s"
  method = "get"
  path = "/api/health"

[[vm]]
  size = "shared-cpu-1x"
  memory = "256mb"            # FastAPI + SQLite 很輕，256MB 夠用
